<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Flashcard Thông Minh</title>
    <!-- Nhúng Tailwind CSS để giao diện đẹp và tương thích mọi thiết bị -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Nhúng PapaParse để tự động phân tích dữ liệu CSV nội bộ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Nhúng FontAwesome cho các biểu tượng -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS tuỳ chỉnh cho hiệu ứng lật thẻ 3D */
        .perspective {
            perspective: 1000px;
        }
        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* Lớp học khi thẻ bị lật */
        .is-flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .flip-card-back {
            transform: rotateY(180deg);
            background-color: #f0f9ff; /* Màu xanh nhạt cho mặt sau */
        }
        
        /* Định dạng hiển thị xuống dòng cho văn bản trong thẻ */
        .card-text {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 flex flex-col items-center py-10 px-4">

    <div class="max-w-3xl w-full">
        <!-- Tiêu đề trang -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2"><i class="fa-solid fa-layer-group mr-2"></i>Flashcard Sinh Viên</h1>
            <p class="text-slate-500">Học tập hiệu quả từ dữ liệu NotebookLM</p>
        </div>

        <!-- Khu vực hiển thị Flashcard (Luôn hiển thị vì đã tích hợp dữ liệu) -->
        <div id="flashcard-section" class="flex flex-col items-center w-full">
            
            <!-- Thông tin tiến độ -->
            <div class="w-full flex flex-col sm:flex-row justify-between items-center mb-4 px-2 gap-3">
                <span id="card-counter" class="text-slate-500 font-medium">Thẻ 1 / 10</span>
                
                <!-- Khu vực thống kê -->
                <div class="flex gap-4 text-sm font-medium text-slate-600 bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200">
                    <div><i class="fa-regular fa-clock text-blue-500 mr-1"></i> <span id="timer-display">00:00</span></div>
                    <div><i class="fa-solid fa-rotate text-green-500 mr-1"></i> <span id="flip-count-display">0</span> lần</div>
                </div>

                <button id="btn-shuffle" class="text-blue-600 hover:text-blue-800 font-medium transition flex items-center">
                    <i class="fa-solid fa-shuffle mr-1"></i> Trộn thẻ
                </button>
            </div>

            <!-- Thẻ Flashcard -->
            <div id="flashcard" class="perspective w-full h-80 sm:h-96 cursor-pointer mb-8">
                <div class="flip-card-inner">
                    <!-- Mặt trước -->
                    <div class="flip-card-front bg-white border-2 border-blue-100">
                        <span class="absolute top-4 left-4 text-xs font-bold text-blue-400 uppercase tracking-wider">Mặt trước / Câu hỏi</span>
                        <div id="card-front-content" class="text-2xl sm:text-3xl text-center font-medium card-text"></div>
                        <span class="absolute bottom-4 text-slate-300 text-sm"><i class="fa-solid fa-hand-pointer mr-1"></i> Bấm để lật</span>
                    </div>
                    <!-- Mặt sau -->
                    <div class="flip-card-back border-2 border-blue-200">
                        <span class="absolute top-4 left-4 text-xs font-bold text-blue-500 uppercase tracking-wider">Mặt sau / Trả lời</span>
                        <div id="card-back-content" class="text-xl sm:text-2xl text-center text-slate-700 card-text"></div>
                    </div>
                </div>
            </div>

            <!-- Bảng điều khiển -->
            <div class="flex justify-center items-center gap-4 w-full">
                <button id="btn-prev" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 font-medium py-3 px-6 rounded-full shadow-sm transition duration-200 flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Trước
                </button>
                <button id="btn-flip" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-8 rounded-full shadow-md transition duration-200 flex items-center">
                    <i class="fa-solid fa-rotate mr-2"></i> Lật thẻ
                </button>
                <button id="btn-next" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 font-medium py-3 px-6 rounded-full shadow-sm transition duration-200 flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                    Tiếp <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
            
            <div class="mt-8 text-center text-sm text-slate-400">
                Mẹo: Dùng phím <kbd class="bg-slate-100 border border-slate-300 px-1 rounded">←</kbd> <kbd class="bg-slate-100 border border-slate-300 px-1 rounded">→</kbd> để chuyển thẻ, <kbd class="bg-slate-100 border border-slate-300 px-2 rounded">Space</kbd> để lật.
            </div>

            <button id="btn-restart" class="mt-8 text-sm text-blue-500 hover:underline">
                <i class="fa-solid fa-rotate-left mr-1"></i> Học lại từ đầu
            </button>
            <button id="btn-finish" class="mt-4 text-sm font-semibold text-green-600 hover:underline">
                <i class="fa-solid fa-flag-checkered mr-1"></i> Kết thúc & Xem điểm
            </button>
        </div>
    </div>

    <script>
        // =========================================================

        const rawCSVData = `Loại nấm nào sau đây có cấu trúc hình mũ điển hình?,Nấm rơm

        // Tự động phân tích chuỗi CSV trên thành mảng flashcard
        let defaultFlashcards = [];
        Papa.parse(rawCSVData.trim(), {
            complete: function(results) {
                // Lọc những dòng có đủ 2 cột (front và back)
                defaultFlashcards = results.data.filter(row => row.length >= 2).map(row => ({
                    front: row[0].trim(),
                    back: row[1].trim()
                }));
            }
        });
        // =========================================================

        // --- TRẠNG THÁI ỨNG DỤNG ---
        let flashcards = [...defaultFlashcards]; // Copy mảng mặc định để sử dụng
        let currentIndex = 0; // Vị trí thẻ hiện tại
        let isFlipped = false; // Trạng thái lật của thẻ

        // BIẾN THỐNG KÊ
        let totalFlips = 0;
        let sessionStartTime = null;
        let timerInterval = null;

        // --- CÁC PHẦN TỬ GIAO DIỆN ---
        const flashcardEl = document.getElementById('flashcard');
        const frontContent = document.getElementById('card-front-content');
        const backContent = document.getElementById('card-back-content');
        const cardCounter = document.getElementById('card-counter');
        
        const timerDisplay = document.getElementById('timer-display');
        const flipCountDisplay = document.getElementById('flip-count-display');
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnFlip = document.getElementById('btn-flip');
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnRestart = document.getElementById('btn-restart');
        const btnFinish = document.getElementById('btn-finish');

        // --- CÁC HÀM LOGIC & HIỂN THỊ ---

        function startFlashcards() {
            if (flashcards.length === 0) return;
            
            currentIndex = 0;
            isFlipped = false;
            
            // Reset thống kê
            totalFlips = 0;
            if(flipCountDisplay) flipCountDisplay.textContent = "0";
            sessionStartTime = new Date();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            updateCardDisplay();
        }

        function updateTimer() {
            if (!sessionStartTime) return;
            const now = new Date();
            const diffSeconds = Math.floor((now - sessionStartTime) / 1000);
            const m = Math.floor(diffSeconds / 60).toString().padStart(2, '0');
            const s = (diffSeconds % 60).toString().padStart(2, '0');
            if(timerDisplay) timerDisplay.textContent = `${m}:${s}`;
        }

        function updateCardDisplay() {
            if (flashcards.length === 0) return;

            // Đảm bảo thẻ luôn quay về mặt trước khi đổi thẻ mới
            if (isFlipped) {
                flashcardEl.classList.remove('is-flipped');
                isFlipped = false;
                // Đợi hiệu ứng lật xong rồi mới đổi chữ để tránh lộ kết quả
                setTimeout(renderText, 300); 
            } else {
                renderText();
            }

            // Cập nhật bộ đếm
            cardCounter.textContent = `Thẻ ${currentIndex + 1} / ${flashcards.length}`;

            // Cập nhật trạng thái nút
            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === flashcards.length - 1;
        }

        function renderText() {
            frontContent.textContent = flashcards[currentIndex].front;
            backContent.textContent = flashcards[currentIndex].back;
        }

        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                flashcardEl.classList.add('is-flipped');
                // Tăng số lần lật khi lật sang mặt sau
                totalFlips++;
                if(flipCountDisplay) flipCountDisplay.textContent = totalFlips;
            } else {
                flashcardEl.classList.remove('is-flipped');
            }
        }

        function goNext() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCardDisplay();
            }
        }

        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCardDisplay();
            }
        }

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- GÁN SỰ KIỆN CLICK ---
        
        flashcardEl.addEventListener('click', flipCard);
        btnFlip.addEventListener('click', flipCard);
        btnNext.addEventListener('click', goNext);
        btnPrev.addEventListener('click', goPrev);
        
        btnShuffle.addEventListener('click', () => {
            if (confirm("Bạn có muốn xáo trộn thứ tự các thẻ không?")) {
                flashcards = shuffleArray(flashcards);
                currentIndex = 0;
                updateCardDisplay();
            }
        });

        btnRestart.addEventListener('click', () => {
            if (confirm("Bạn có chắc muốn bắt đầu lại từ đầu? Đồng hồ sẽ được làm mới.")) {
                flashcards = [...defaultFlashcards]; // Reset lại mảng về thứ tự ban đầu
                startFlashcards();
            }
        });

        btnFinish.addEventListener('click', () => {
            if(timerInterval) clearInterval(timerInterval); // Dừng đồng hồ
            
            const timeSpent = timerDisplay ? timerDisplay.textContent : "00:00";
            
            // Yêu cầu học sinh nhập tên
            const studentName = prompt("🎉 BẠN ĐÃ HOÀN THÀNH!\n\nVui lòng nhập Họ và Tên của bạn để nộp kết quả cho giáo viên:");
            
            if (!studentName) {
                alert("Bạn chưa nhập tên. Kết quả chưa được gửi!");
                // Cho phép đồng hồ chạy lại nếu học sinh bấm huỷ
                timerInterval = setInterval(updateTimer, 1000);
                return;
            }

            // Đổi trạng thái nút để báo đang gửi
            const originalBtnHtml = btnFinish.innerHTML;
            btnFinish.disabled = true;
            btnFinish.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Đang gửi dữ liệu...';
            btnFinish.classList.add('opacity-50', 'cursor-not-allowed');

            // Gửi dữ liệu qua Google Apps Script
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwo3Xh_VrBgN71580NQYJHKCDjrnOCACoz63nZGxGKOjP5RLRsLaXJ8NwxVOS6YdqQv5g/exec';
            
            // Đóng gói dữ liệu dạng JSON khớp với cấu trúc định tuyến action của GAS
            const payloadData = {
                action: 'save_flashcard',
                sheetName: 'Flashcard',
                name: studentName,
                time: timeSpent,
                flips: totalFlips
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Tránh lỗi CORS từ Google Script
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8' // Dùng text/plain để vượt qua CORS preflight
                },
                body: JSON.stringify(payloadData) // Gửi đi như một chuỗi JSON
            })
            .then(() => {
                alert(`✅ ĐÃ GỬI KẾT QUẢ THÀNH CÔNG!\n\n- Học sinh: ${studentName}\n- Thời gian học: ${timeSpent}\n- Số lần lật thẻ: ${totalFlips} lần`);
            })
            .catch(error => {
                alert('❌ Lỗi khi gửi kết quả. Vui lòng kiểm tra lại mạng hoặc báo cho giáo viên.');
                console.error('Error!', error.message);
            })
            .finally(() => {
                btnFinish.disabled = false;
                btnFinish.innerHTML = originalBtnHtml;
                btnFinish.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        });

        // --- HỖ TRỢ PHÍM TẮT BÀN PHÍM ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
                e.preventDefault(); // Tránh cuộn trang
                flipCard();
            } else if (e.code === 'ArrowRight') {
                goNext();
            } else if (e.code === 'ArrowLeft') {
                goPrev();
            }
        });

        // --- KHỞI CHẠY KHI VỪA MỞ TRANG ---
        document.addEventListener('DOMContentLoaded', () => {
            startFlashcards();
        });

    </script>
</body>
</html>
